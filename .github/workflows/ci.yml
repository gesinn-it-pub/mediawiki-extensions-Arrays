name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.adoc'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.adoc'
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        include:
          - mediawiki_version: '1.39'
            php_version: 8.1
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: false
          - mediawiki_version: '1.43'
            php_version: 8.3
            database_type: mysql
            database_image: "mysql:8"
            coverage: true
            experimental: false

    env:
      MW_VERSION: ${{ matrix.mediawiki_version }}
      PHP_VERSION: ${{ matrix.php_version }}
      DB_TYPE: ${{ matrix.database_type }}
      DB_IMAGE: ${{ matrix.database_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests
        run: make ci
        if: matrix.coverage == false

      - name: Run tests with coverage
        run: mkdir -p build/coverage && make ci-coverage
        if: matrix.coverage == true

      - name: Upload code coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: gesinn-it-pub/mediawiki-extensions-Arrays
          files: build/coverage/php/coverage.xml
          disable_search: true
        if: matrix.coverage == true
